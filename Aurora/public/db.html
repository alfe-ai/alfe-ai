<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Database Tables</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f6f7f9;
      color: #111;
    }
    header {
      padding: 1.5rem 2rem 0.5rem;
    }
    h1 {
      margin: 0 0 0.5rem;
    }
    .layout {
      display: flex;
      gap: 1.5rem;
      padding: 0 2rem 2rem;
      min-height: calc(100vh - 80px);
      box-sizing: border-box;
    }
    aside {
      width: 240px;
      background: #fff;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    aside h2 {
      font-size: 1rem;
      margin: 0;
      color: #334155;
    }
    .table-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .table-list button {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 0.45rem 0.6rem;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.15s ease, border 0.15s ease;
    }
    .table-list button:hover,
    .table-list button:focus {
      background: #e2e8f0;
      border-color: #cbd5f5;
      outline: none;
    }
    .table-list button.active {
      background: #0f172a;
      color: #fff;
    }
    main {
      flex: 1;
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.5rem 1.5rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-width: 0;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: center;
      justify-content: space-between;
    }
    .toolbar span {
      color: #475569;
      font-size: 0.95rem;
    }

    .query-editor {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .query-editor label {
      font-size: 0.9rem;
      color: #475569;
      font-weight: 600;
    }
    .query-editor textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0.65rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.88rem;
      box-sizing: border-box;
      background: #f8fafc;
      color: #0f172a;
    }
    .query-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .query-actions button {
      border: 1px solid #cbd5e1;
      background: #0f172a;
      color: #fff;
      border-radius: 8px;
      padding: 0.45rem 0.8rem;
      cursor: pointer;
      font-size: 0.88rem;
    }
    .query-actions button.secondary {
      background: #fff;
      color: #0f172a;
    }
    .status {
      font-size: 0.9rem;
      color: #64748b;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .db-info {
      padding: 0 2rem 2rem;
    }
    .db-info-card {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
    }
    .db-info-card h2 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      color: #334155;
    }
    .db-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.5rem 1.5rem;
      font-size: 0.9rem;
      color: #475569;
    }
    .db-info-grid span {
      color: #0f172a;
      font-weight: 600;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 600px;
    }
    th, td {
      border-bottom: 1px solid #e2e8f0;
      padding: 0.55rem 0.75rem;
      font-size: 0.9rem;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:nth-child(even) {
      background: #f9fafb;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
    }
    .empty {
      padding: 1.5rem;
      color: #94a3b8;
      text-align: center;
    }
    .deferred-table-wrap {
      display: flex;
      justify-content: center;
      padding: 1.5rem;
    }
    .view-table-btn {
      border: 1px solid #dc2626;
      background: #dc2626;
      color: #fff;
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .view-table-btn:hover,
    .view-table-btn:focus {
      background: #b91c1c;
      border-color: #b91c1c;
      outline: none;
    }
    .reveal-email-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0f172a;
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .reveal-email-btn:hover,
    .reveal-email-btn:focus {
      background: #f1f5f9;
      border-color: #94a3b8;
      outline: none;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #0b1120;
        color: #e2e8f0;
      }
      aside,
      main {
        background: #0f172a;
        box-shadow: none;
        border: 1px solid #1e293b;
      }
      .table-list button {
        background: #1e293b;
        color: #e2e8f0;
      }
      .table-list button:hover,
      .table-list button:focus {
        background: #334155;
        border-color: #475569;
      }
      .table-list button.active {
        background: #f8fafc;
        color: #0f172a;
      }
      th {
        background: #1e293b;
      }
      td,
      th {
        border-bottom-color: #1f2937;
      }
      tbody tr:nth-child(even) {
        background: #0b1224;
      }
      .status,
      .toolbar span {
        color: #94a3b8;
      }
      .table-wrap {
        border-color: #1f2937;
      }
      .db-info-card {
        background: #0f172a;
        border-color: #1e293b;
        box-shadow: none;
      }
      .db-info-card h2 {
        color: #e2e8f0;
      }
      .db-info-grid {
        color: #94a3b8;
      }
      .db-info-grid span {
        color: #f8fafc;
      }

      .query-editor label {
        color: #94a3b8;
      }
      .query-editor textarea {
        background: #111827;
        color: #e2e8f0;
        border-color: #334155;
      }
      .query-actions button {
        background: #e2e8f0;
        color: #0f172a;
        border-color: #64748b;
      }
      .query-actions button.secondary {
        background: transparent;
        color: #e2e8f0;
      }
      .reveal-email-btn {
        background: transparent;
        color: #e2e8f0;
        border-color: #475569;
      }
      .reveal-email-btn:hover,
      .reveal-email-btn:focus {
        background: #1e293b;
        border-color: #64748b;
      }
      a {
        color: #38bdf8;
      }
    }
    .writable-indicator {
      display: inline-block;
      margin-left: 1rem;
      font-size: 0.8rem;
      color: #dc2626;
      font-weight: 600;
      background: #fee2e2;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
    @media (prefers-color-scheme: dark) {
      .writable-indicator {
        background: #450a0a;
        color: #fca5a5;
      }
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: #fff;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 90%;
    }
    @media (prefers-color-scheme: dark) {
      .modal {
        background: #0f172a;
        border: 1px solid #1e293b;
      }
    }
    .modal h3 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
    }
    .modal label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #475569;
    }
    @media (prefers-color-scheme: dark) {
      .modal label {
        color: #94a3b8;
      }
    }
    .modal input[type="password"] {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    @media (prefers-color-scheme: dark) {
      .modal input[type="password"] {
        background: #111827;
        color: #e2e8f0;
        border-color: #334155;
      }
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }
    .modal-actions button {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .modal-actions button.primary {
      background: #dc2626;
      color: #fff;
      border: none;
    }
    .modal-actions button.primary:hover {
      background: #b91c1c;
    }
    .modal-actions button.secondary {
      background: #f1f5f9;
      color: #0f172a;
      border: none;
    }
    @media (prefers-color-scheme: dark) {
      .modal-actions button.secondary {
        background: #1e293b;
        color: #e2e8f0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Database</h1>
    <a href="/">← Back</a>
  </header>
  <section class="layout">
    <aside>
      <h2>Tables</h2>
      <div class="status" id="tableStatus">Loading tables…</div>
      <ul class="table-list" id="tableList"></ul>
    </aside>
    <main>
      <div class="query-editor">
        <label for="queryInput">Manual query</label>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <textarea id="queryInput" placeholder="SELECT * FROM your_table LIMIT 200;"></textarea>
          <span id="writableIndicator" class="writable-indicator" style="display: none;">Writable</span>
        </div>
        <div class="query-actions">
          <button type="button" id="runQueryBtn">Run query</button>
          <button type="button" id="toggleWritableBtn" class="secondary">Enable Writable Queries</button>
          <button type="button" class="secondary" id="clearQueryBtn">Clear</button>
        </div>
      </div>
      <div class="toolbar">
        <span id="activeTable">Select a table to view its contents.</span>
        <span id="rowMeta"></span>
      </div>
      <div class="status" id="dataStatus"></div>
      <div class="table-wrap" id="tableWrap">
        <div class="empty">No table selected.</div>
      </div>
    </main>
  </section>
  <footer class="db-info">
    <div class="db-info-card" id="dbInfo">
      <h2>Connection Info</h2>
      <div class="status">Loading database connection info…</div>
    </div>
  </footer>

  <!-- Modal for admin token -->
  <div class="modal-overlay" id="tokenModalOverlay">
    <div class="modal" id="tokenModal">
      <h3>Enable Writable Queries</h3>
      <label for="adminTokenInput">Admin Token</label>
      <input type="password" id="adminTokenInput" placeholder="Enter admin token" />
      <div class="modal-actions">
        <button type="button" class="secondary" id="cancelTokenBtn">Cancel</button>
        <button type="button" class="primary" id="submitTokenBtn">Enable</button>
      </div>
    </div>
  </div>

  <script>
    const tableList = document.getElementById("tableList");
    const tableStatus = document.getElementById("tableStatus");
    const activeTable = document.getElementById("activeTable");
    const rowMeta = document.getElementById("rowMeta");
    const dataStatus = document.getElementById("dataStatus");
    const tableWrap = document.getElementById("tableWrap");
    const dbInfo = document.getElementById("dbInfo");
    const queryInput = document.getElementById("queryInput");
    const runQueryBtn = document.getElementById("runQueryBtn");
    const clearQueryBtn = document.getElementById("clearQueryBtn");
    const toggleWritableBtn = document.getElementById("toggleWritableBtn");
    const writableIndicator = document.getElementById("writableIndicator");
    const tokenModalOverlay = document.getElementById("tokenModalOverlay");
    const tokenModal = document.getElementById("tokenModal");
    const adminTokenInput = document.getElementById("adminTokenInput");
    const cancelTokenBtn = document.getElementById("cancelTokenBtn");
    const submitTokenBtn = document.getElementById("submitTokenBtn");

    const WRITABLE_TOKEN_STORAGE_KEY = "dbAdminWritableToken";
    let writableMode = false;
    let writableToken = null;

    function getQueryKind(queryText) {
      const sql = typeof queryText === "string" ? queryText : "";
      const stripped = sql.replace(/^(?:\s|--[^\n]*\n|\/\*[\s\S]*?\*\/)+/g, "").trim();
      const keyword = stripped.match(/^[a-z]+/i)?.[0]?.toLowerCase() || "";
      const readOnlyStarts = ["select", "with", "pragma", "explain"];
      const writeStarts = ["insert", "update", "delete", "create", "drop", "alter", "begin", "commit", "rollback", "truncate"];
      if (readOnlyStarts.includes(keyword)) return "read";
      if (writeStarts.includes(keyword)) return "write";
      return "unknown";
    }

    function syncWritableUiState() {
      writableIndicator.style.display = writableMode ? "inline-block" : "none";
      toggleWritableBtn.classList.toggle("secondary", !writableMode);
      toggleWritableBtn.classList.toggle("view-table-btn", writableMode);
      toggleWritableBtn.textContent = writableMode ? "Writable Queries Enabled" : "Enable Writable Queries";
      toggleWritableBtn.disabled = false;
    }

    function setWritableMode(enabled, token = null) {
      writableMode = enabled;
      writableToken = enabled ? token : null;
      if (enabled && token) {
        localStorage.setItem(WRITABLE_TOKEN_STORAGE_KEY, token);
      } else {
        localStorage.removeItem(WRITABLE_TOKEN_STORAGE_KEY);
      }
      syncWritableUiState();
    }

    // URL-based table selection (supports both hash and pathname routes)
    function getTableFromHash() {
      const hash = window.location.hash;
      if (hash.startsWith('#/db/')) {
        const tableName = decodeURIComponent(hash.substring(5));
        return tableName || null;
      }
      return null;
    }

    function getTableFromPathname() {
      const pathname = window.location.pathname;
      if (pathname.startsWith('/db/')) {
        const tableName = decodeURIComponent(pathname.substring(4));
        return tableName || null;
      }
      return null;
    }

    function updateHashForTable(tableName) {
      if (tableName) {
        const newHash = '#/db/' + encodeURIComponent(tableName);
        if (window.location.hash !== newHash) {
          window.location.hash = newHash;
        }
        // Also update pathname to support direct linking
        const newPathname = '/db/' + encodeURIComponent(tableName);
        if (window.location.pathname !== newPathname) {
          history.pushState(null, '', newPathname);
        }
      } else {
        if (window.location.hash && window.location.hash.startsWith('#/db/')) {
          window.location.hash = '';
        }
        // Clear pathname if no table selected
        if (window.location.pathname.startsWith('/db/')) {
          history.pushState(null, '', '/db');
        }
      }
    }

    function setActiveButton(name) {
      document.querySelectorAll(".table-list button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.table === name);
      });
    }

    function shouldMaskSensitiveCell(tableName, columnName, value) {
      if (value === null || typeof value === "undefined") {
        return false;
      }

      if (tableName === "alfecode_runs" && (columnName === "final_output_message" || columnName === "payload_json")) {
        return true;
      }

      if (tableName === "accounts" && columnName === "email") {
        return true;
      }

      if (tableName === "chat_tabs" && columnName === "name") {
        return true;
      }

      if (tableName === "support_requests" && (columnName === "message" || columnName === "email")) {
        return true;
      }

      return tableName === "support_request_replies" && columnName === "message";
    }

    function getRevealButtonLabel(tableName, columnName) {
      if (tableName === "alfecode_runs" && columnName === "final_output_message") {
        return "View Final Output";
      }

      if (tableName === "alfecode_runs" && columnName === "payload_json") {
        return "View Payload JSON";
      }

      if (tableName === "accounts" && columnName === "email") {
        return "View Email";
      }

      if (tableName === "chat_tabs" && columnName === "name") {
        return "View Name";
      }

      if (tableName === "chat_pairs" && columnName === "user_text") {
        return "View User Text";
      }

      if (tableName === "chat_pairs" && columnName === "ai_text") {
        return "View AI Text";
      }

      if (tableName === "support_requests" && columnName === "message") {
        return "View Message";
      }

      if (tableName === "support_requests" && columnName === "email") {
        return "View Email";
      }

      if (tableName === "support_request_replies" && columnName === "message") {
        return "View Message";
      }

      return "View";
    }

    function renderTable(columns, rows, tableName = "") {
      if (!columns.length) {
        tableWrap.innerHTML = "<div class='empty'>No columns found.</div>";
        return;
      }
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      columns.forEach((col) => {
        const th = document.createElement("th");
        th.textContent = col;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      if (!rows.length) {
        const emptyRow = document.createElement("tr");
        const emptyCell = document.createElement("td");
        emptyCell.colSpan = columns.length;
        emptyCell.className = "empty";
        emptyCell.textContent = "No rows found.";
        emptyRow.appendChild(emptyCell);
        tbody.appendChild(emptyRow);
      } else {
        rows.forEach((row) => {
          const tr = document.createElement("tr");
          columns.forEach((col) => {
            const td = document.createElement("td");
            const value = row[col];
            if (shouldMaskSensitiveCell(tableName, col, value)) {
              const button = document.createElement("button");
              button.type = "button";
              button.className = "reveal-email-btn";
              button.textContent = getRevealButtonLabel(tableName, col);
              button.addEventListener("click", () => {
                td.textContent = String(value);
              });
              td.appendChild(button);
            } else if (value && typeof value === "object") {
              const pre = document.createElement("pre");
              pre.textContent = JSON.stringify(value, null, 2);
              td.appendChild(pre);
            } else {
              td.textContent = value === null || typeof value === "undefined" ? "" : String(value);
            }
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      }
      table.appendChild(tbody);
      tableWrap.innerHTML = "";
      tableWrap.appendChild(table);
    }

    async function runManualQuery() {
      const query = queryInput.value.trim();
      if (!query) {
        dataStatus.textContent = "Enter a query to run.";
        return;
      }
      setActiveButton("");
      activeTable.textContent = "Custom query";
      dataStatus.textContent = "Running query…";
      rowMeta.textContent = "";
      tableWrap.innerHTML = "<div class='empty'>Loading…</div>";
      try {
        const queryKind = getQueryKind(query);
        const shouldUseWriteEndpoint = writableMode && queryKind === "write";
        const endpoint = shouldUseWriteEndpoint ? "/api/db/query/write" : "/api/db/query";
        const payload = writableToken ? { query, token: writableToken } : { query };
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (!res.ok) {
          if (writableMode && res.status === 403 && result.error?.includes("token")) {
            setWritableMode(false);
            throw new Error("Invalid admin token. Writable mode disabled.");
          }
          throw new Error(result.error || "Query failed");
        }
        const columns = result.columns || [];
        const rows = result.rows || [];
        const totalRows = typeof result.totalRows === "number" ? result.totalRows : rows.length;
        dataStatus.textContent = "";
        rowMeta.textContent = `${rows.length} row${rows.length === 1 ? "" : "s"}${totalRows > rows.length ? ` (showing first ${rows.length} of ${totalRows})` : ""}`;
        renderTable(columns, rows, "");
      } catch (err) {
        dataStatus.textContent = err?.message || "Unable to run query.";
        tableWrap.innerHTML = "<div class='empty'>No data available.</div>";
        console.error(err);
      }
    }

    async function loadTables() {
      try {
        const res = await fetch("/api/db/tables");
        if (!res.ok) throw new Error("Failed to load tables");
        const data = await res.json();
        const tables = data.tables || [];
        tableStatus.textContent = tables.length ? "" : "No tables found.";
        tableList.innerHTML = "";
        tables.forEach((name) => {
          const li = document.createElement("li");
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = name;
          btn.dataset.table = name;
          btn.addEventListener("click", () => loadTableData(name));
          li.appendChild(btn);
          tableList.appendChild(li);
        });
        if (tables.length) {
          // Check for table name in URL (hash or pathname) on initial load
          const tableFromHash = getTableFromHash();
          const tableFromPathname = getTableFromPathname();
          const tableFromUrl = tableFromHash || tableFromPathname;
          if (tableFromUrl) {
            loadTableData(tableFromUrl);
          } else {
            loadTableData(tables[0]);
          }
        }
      } catch (err) {
        tableStatus.textContent = "Unable to load tables.";
        console.error(err);
      }
    }

    async function loadTableData(name) {
      try {
        setActiveButton(name);
        activeTable.textContent = `Table: ${name}`;
        rowMeta.textContent = "";

        dataStatus.textContent = "Loading data…";
        tableWrap.innerHTML = "<div class='empty'>Loading…</div>";

        // Update URL hash to reflect current table selection
        updateHashForTable(name);

        const res = await fetch(`/api/db/table/${encodeURIComponent(name)}`);
        if (!res.ok) {
          throw new Error(`Failed to load table ${name}`);
        }
        const data = await res.json();
        const columns = data.columns || [];
        const rows = data.rows || [];
        dataStatus.textContent = "";
        rowMeta.textContent = `${rows.length} row${rows.length === 1 ? "" : "s"} (limit ${data.limit || 0})`;
        renderTable(columns, rows, name);
      } catch (err) {
        dataStatus.textContent = "Unable to load table data.";
        tableWrap.innerHTML = "<div class='empty'>No data available.</div>";
        console.error(err);
      }
    }

    runQueryBtn.addEventListener("click", runManualQuery);
    clearQueryBtn.addEventListener("click", () => {
      queryInput.value = "";
      queryInput.focus();
    });

    // Handle hash changes for browser navigation
    window.addEventListener('hashchange', () => {
      const tableFromHash = getTableFromHash();
      const tableFromPathname = getTableFromPathname();
      const tableFromUrl = tableFromHash || tableFromPathname;
      if (tableFromUrl) {
        loadTableData(tableFromUrl);
      }
    });

    // Handle browser back/forward navigation for hash routes
    window.addEventListener('popstate', () => {
      const tableFromHash = getTableFromHash();
      const tableFromPathname = getTableFromPathname();
      const tableFromUrl = tableFromHash || tableFromPathname;
      if (tableFromUrl) {
        loadTableData(tableFromUrl);
      }
    });

    // Writable mode toggle
    toggleWritableBtn.addEventListener("click", () => {
      if (writableMode) {
        // Disable writable mode
        setWritableMode(false);
      } else {
        // Show modal to enter token
        tokenModalOverlay.classList.add("active");
        adminTokenInput.value = "";
        adminTokenInput.focus();
      }
    });

    // Modal close handlers
    const closeTokenModal = () => {
      tokenModalOverlay.classList.remove("active");
    };
    cancelTokenBtn.addEventListener("click", closeTokenModal);
    tokenModalOverlay.addEventListener("click", (e) => {
      if (e.target === tokenModalOverlay) closeTokenModal();
    });

    // Submit token
    submitTokenBtn.addEventListener("click", async () => {
      const token = adminTokenInput.value.trim();
      if (!token) {
        alert("Please enter the admin token.");
        return;
      }

      toggleWritableBtn.disabled = true;
      toggleWritableBtn.textContent = "Verifying token...";

      try {
        const res = await fetch("/api/db/query/write/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });
        const result = await res.json();

        if (res.ok) {
          setWritableMode(true, token);
          closeTokenModal();
          dataStatus.textContent = "Writable queries enabled!";
        } else {
          toggleWritableBtn.disabled = false;
          toggleWritableBtn.textContent = "Enable Writable Queries";
          alert(result.error || "Invalid token. Please try again.");
        }
      } catch (err) {
        toggleWritableBtn.disabled = false;
        toggleWritableBtn.textContent = "Enable Writable Queries";
        alert("Error verifying token: " + err.message);
      }
    });

    const storedWritableToken = localStorage.getItem(WRITABLE_TOKEN_STORAGE_KEY);
    if (storedWritableToken) {
      setWritableMode(true, storedWritableToken);
    } else {
      syncWritableUiState();
    }

    loadTables();

    async function loadDbInfo() {
      try {
        const res = await fetch("/api/db/info");
        if (!res.ok) throw new Error("Failed to load db info");
        const info = await res.json();
        const grid = document.createElement("div");
        grid.className = "db-info-grid";

        const addItem = (label, value) => {
          const div = document.createElement("div");
          div.innerHTML = `${label}: <span>${value || "—"}</span>`;
          grid.appendChild(div);
        };

        if (info.type === "sqlite") {
          addItem("Type", "SQLite (local)");
          addItem("Path", info.path || "—");
          addItem("File exists", info.exists ? "Yes" : "No");
        } else {
          addItem("Type", info.type ? `${info.type.toUpperCase()} (${info.source || "Remote"})` : "Remote DB");
          addItem("Host", info.host || "—");
          addItem("Port", info.port || "—");
          addItem("Database", info.database || "—");
          addItem("User", info.user || "—");
          addItem("SSL", info.ssl ? "Enabled" : "Disabled");
        }

        dbInfo.innerHTML = "<h2>Connection Info</h2>";
        dbInfo.appendChild(grid);
      } catch (err) {
        dbInfo.innerHTML = "<h2>Connection Info</h2><div class='status'>Unable to load connection info.</div>";
        console.error(err);
      }
    }

    loadDbInfo();
  </script>
</body>
</html>
